stages:
  - test
  - build

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # Image name for the container registry
  IMAGE_NAME: registry.coldforge.xyz/coldforge/coldforge-vault

# Cache Go modules across jobs
.go-cache: &go-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
    policy: pull-push

# =============================================================================
# TEST STAGE
# =============================================================================

# Run unit tests
test:unit:
  stage: test
  image: golang:1.24-alpine
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
    CGO_ENABLED: "1"
  before_script:
    - apk add --no-cache git ca-certificates build-base
    - mkdir -p .go
  script:
    - cd backend
    - go mod tidy
    - go test -v -race -cover ./...
  coverage: '/coverage: \d+\.\d+% of statements/'

# Run linter (allow failure for now)
lint:
  stage: test
  image: golang:1.24-alpine
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
  before_script:
    - apk add --no-cache git ca-certificates curl
    - mkdir -p .go
    - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.62.2
  script:
    - cd backend
    - ${GOPATH}/bin/golangci-lint run --timeout 5m ./...
  allow_failure: true

# =============================================================================
# BUILD STAGE
# =============================================================================

# Build and push Docker image
build:image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"registry.coldforge.xyz\":{\"auth\":\"$(printf '%s:%s' "${REGISTRY_USER}" "${REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context ${CI_PROJECT_DIR}
      --dockerfile ${CI_PROJECT_DIR}/Dockerfile
      --destination ${IMAGE_NAME}:${CI_COMMIT_SHA}
      --destination ${IMAGE_NAME}:${CI_COMMIT_REF_SLUG}
      --destination ${IMAGE_NAME}:latest
      --build-arg CI_COMMIT_SHA=${CI_COMMIT_SHA}
      --build-arg CI_COMMIT_REF_NAME=${CI_COMMIT_REF_NAME}
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Build for tags (semantic versioning)
build:release:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"registry.coldforge.xyz\":{\"auth\":\"$(printf '%s:%s' "${REGISTRY_USER}" "${REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context ${CI_PROJECT_DIR}
      --dockerfile ${CI_PROJECT_DIR}/Dockerfile
      --destination ${IMAGE_NAME}:${CI_COMMIT_TAG}
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
