  name: vault-secrets
  namespace: coldforge-vault
type: Opaque
data:
  # Base64 encoded values - replace with actual values
  # echo -n 'actual_password' | base64
  DB_PASSWORD: dmF1bHRfcGFzc3dvcmQ=  # vault_password
