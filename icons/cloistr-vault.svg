<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background - original dark -->
  <rect width="64" height="64" rx="12" fill="#1E1E2E"/>

  <!-- Archway frame -->
  <g fill="none" stroke="#E5E7EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 14 52 L 14 24 A 18 18 0 0 1 50 24 L 50 52"/>
  </g>

  <!-- Vault symbol: shield with lock -->
  <g fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Shield -->
    <path d="M 32 28 L 42 32 L 42 42 C 42 48 32 52 32 52 C 32 52 22 48 22 42 L 22 32 Z"/>
    <!-- Lock body -->
    <rect x="28" y="40" width="8" height="6" rx="1"/>
    <!-- Lock shackle -->
    <path d="M 30 40 L 30 37 A 2 2 0 0 1 34 37 L 34 40"/>
  </g>
</svg>
