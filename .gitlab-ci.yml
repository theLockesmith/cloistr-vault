stages:
  - test
  - build

variables:
  GO_VERSION: "1.25"
  GIT_STRATEGY: none

.go-cache: &go-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}-go
    paths:
      - .go/pkg/mod/

test:unit:
  stage: test
  tags: [local]
  image: golang:${GO_VERSION}-bookworm
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
    CGO_ENABLED: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git ca-certificates build-essential
    - mkdir -p .go
    - |
      for i in 1 2 3 4 5; do
        git clone --depth 20 --branch ${CI_COMMIT_REF_NAME} ${CI_REPOSITORY_URL} /tmp/src && break
        echo "Clone attempt $i failed, retrying in $((i*5))s..."
        sleep $((i*5))
      done
    - cp -r /tmp/src/. .
    - git checkout ${CI_COMMIT_SHA}
  script:
    - cd backend
    - go mod tidy
    - go test -v -race -cover ./...
  coverage: '/coverage: \d+\.\d+% of statements/'

lint:
  stage: test
  tags: [local]
  image: golangci/golangci-lint:latest
  <<: *go-cache
  before_script:
    - |
      for i in 1 2 3 4 5; do
        git clone --depth 20 --branch ${CI_COMMIT_REF_NAME} ${CI_REPOSITORY_URL} /tmp/src && break
        echo "Clone attempt $i failed, retrying in $((i*5))s..."
        sleep $((i*5))
      done
    - cp -r /tmp/src/. .
    - git checkout ${CI_COMMIT_SHA}
  script:
    - cd backend
    - golangci-lint run --timeout 10m ./...
  allow_failure: true

build:
  stage: build
  tags: [local]
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache git
    - |
      for i in 1 2 3 4 5; do
        git clone --depth 20 --branch ${CI_COMMIT_REF_NAME} ${CI_REPOSITORY_URL} /tmp/src && break
        echo "Clone attempt $i failed, retrying in $((i*5))s..."
        sleep $((i*5))
      done
    - cp -r /tmp/src/. .
    - git checkout ${CI_COMMIT_SHA}
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  script:
    - docker build -t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${CI_REGISTRY_IMAGE}:latest .
    - |
      success=false
      for i in 1 2 3 4 5; do
        if docker push ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}; then
          success=true
          break
        fi
        echo "Push attempt $i failed, retrying in $((i*10))s..."
        sleep $((i*10))
      done
      $success || { echo "ERROR: All push attempts failed for ${CI_COMMIT_SHORT_SHA}"; exit 1; }
    - |
      success=false
      for i in 1 2 3 4 5; do
        if docker push ${CI_REGISTRY_IMAGE}:latest; then
          success=true
          break
        fi
        echo "Push attempt $i failed, retrying in $((i*10))s..."
        sleep $((i*10))
      done
      $success || { echo "ERROR: All push attempts failed for latest"; exit 1; }
