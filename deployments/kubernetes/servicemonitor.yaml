apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vault-api-monitor
  namespace: coldforge-vault
  labels:
    app: vault-api
    release: prometheus  # Match your Prometheus Operator release label
spec:
  selector:
    matchLabels:
      app: vault-api
  namespaceSelector:
    matchNames:
      - coldforge-vault
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
      metricRelabelings:
        # Keep all coldforge_vault metrics
        - sourceLabels: [__name__]
          regex: 'coldforge_vault_.*'
          action: keep
